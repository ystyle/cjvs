name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Cangjie with cjvs
        run: |
          set -e
          curl -sL "https://github.com/ystyle/cjvs/releases/download/v0.4.0/cjvs_bootstrap_linux_amd64.zip" -o /tmp/cjvs.zip
          unzip -o /tmp/cjvs.zip -d /tmp/cjvs-bin
          chmod +x /tmp/cjvs-bin/cjvs
          export PATH="/tmp/cjvs-bin:$PATH"

          cjvs install 1.1.0
          cjvs use 1.1.0
          cjvs stdx install 1.1.0.1

          # 设置环境变量供后续步骤使用
          CJVS_STORE="$HOME/.config/cjvs/store/1.1.0"
          STDX_DIR="$HOME/.config/cjvs/stdx/1.1.0.1"
          echo "CANGJIE_HOME=${CJVS_STORE}" >> $GITHUB_ENV
          echo "CANGJIE_STDX_PATH=${STDX_DIR}/linux_x86_64_cjnative/static/stdx" >> $GITHUB_ENV
          echo "${CJVS_STORE}/bin" >> $GITHUB_PATH
          echo "${CJVS_STORE}/tools/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=${CJVS_STORE}/runtime/lib/linux_x86_64_cjnative:${CJVS_STORE}/tools/lib:${CJVS_STORE}/third_party/llvm/lib" >> $GITHUB_ENV

      - name: Build
        run: cjpm build

      - name: Test
        run: |
          ./target/release/bin/main --version
          ./target/release/bin/main env bash | head -5