name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v4
      - uses: Zxilly/setup-cangjie@v3
        with:
          channel: sts
          version: 1.1.0
          components: stdx

      - name: Find stdx path
        run: |
          echo "STDX_STATIC=$CANGJIE_STDX_PATH_STATIC"
          echo "STDX_DYNAMIC=$CANGJIE_STDX_PATH_DYNAMIC"
          find "$CANGJIE_STDX_PATH_STATIC" -name "*.a" 2>/dev/null | head -10
          find "$CANGJIE_STDX_PATH_STATIC" -name "libstdx*" 2>/dev/null | head -10

      - name: Build
        run: cjpm build
      - name: Test
        run: |
          ./target/release/bin/main --version
          ./target/release/bin/main env bash | head -5