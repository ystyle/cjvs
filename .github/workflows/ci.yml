name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Cangjie SDK
        run: |
          set -e
          TAG="v0.3.9"
          curl -sL "https://github.com/ystyle/cjvs/releases/download/${TAG}/cjvs_v0.3.9_linux_amd64.zip" -o /tmp/cjvs.zip
          unzip -o /tmp/cjvs.zip -d /tmp/cjvs-bin
          chmod +x /tmp/cjvs-bin/cjvs
          export PATH="/tmp/cjvs-bin:$PATH"
          cjvs install 1.1.0
          cjvs use 1.1.0
          cjvs stdx install 1.1.0.1

      - name: Build
        run: cjpm build

      - name: Test
        run: |
          ./target/release/bin/main --version
          ./target/release/bin/main env bash | head -5