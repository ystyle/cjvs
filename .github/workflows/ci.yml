name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Cangjie
        uses: ystyle/cjvs/.github/actions/setup-cangjie@v0.3.9
        with:
          version: 1.1.0

      - name: Verify Cangjie
        run: |
          cjc --version
          cjpm --version
          echo "CANGJIE_HOME=${CANGJIE_HOME}"
          echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}"

      - name: Build project
        run: |
          cjpm build
