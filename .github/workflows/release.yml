name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install mingw toolchain
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 zip

      - name: Setup Cangjie SDK
        run: |
          set -e
          # 直接下载 SDK
          URL=$(curl -sL "https://dll.ystyle.top/images/cjvs-index.json" | jq -r '.[] | select(.version == "1.1.0" and .os == "linux" and .arch == "x86_64") | .url')
          curl -sL "${URL}" -o /tmp/cangjie.tar.gz
          mkdir -p /opt/cangjie
          tar -zxf /tmp/cangjie.tar.gz -C /opt/cangjie
          CANGJIE_HOME="/opt/cangjie/cangjie"
          echo "CANGJIE_HOME=${CANGJIE_HOME}" >> $GITHUB_ENV
          echo "${CANGJIE_HOME}/bin" >> $GITHUB_PATH
          echo "${CANGJIE_HOME}/tools/bin" >> $GITHUB_PATH

          # 下载 Linux stdx
          curl -sL "https://atomgit.com/Cangjie/cangjie_stdx/releases/download/v1.1.0.1/cangjie-stdx-linux-x64-1.1.0.1.zip" -o /tmp/stdx.zip
          mkdir -p /opt/stdx/1.1.0.1
          unzip -o /tmp/stdx.zip -d /opt/stdx/1.1.0.1
          echo "CANGJIE_STDX_PATH=/opt/stdx/1.1.0.1/cangjie/lib/linux_x86_64_cjnative/static/stdx" >> $GITHUB_ENV

          # 下载 Windows stdx
          curl -sL "https://atomgit.com/Cangjie/cangjie_stdx/releases/download/v1.1.0.1/cangjie-stdx-windows-x64-1.1.0.1.zip" -o /tmp/stdx-win.zip
          mkdir -p /opt/stdx/1.1.0.1-windows
          unzip -o /tmp/stdx-win.zip -d /opt/stdx/1.1.0.1-windows

      - name: Build Linux binary
        run: |
          cjpm build
          cp ./target/release/bin/main ./target/release/bin/cjvs
          mkdir -p dist
          zip -j dist/cjvs_linux_amd64.zip ./target/release/bin/cjvs

      - name: Build Windows binary
        env:
          CANGJIE_STDX_PATH: "/opt/stdx/1.1.0.1-windows/cangjie/lib/windows_x86_64_cjnative/static/stdx"
        run: |
          cjpm build --target x86_64-w64-mingw32
          cp ./target/x86_64-w64-mingw32/release/bin/main.exe ./target/x86_64-w64-mingw32/release/bin/cjvs.exe
          zip -j dist/cjvs_windows_amd64.zip ./target/x86_64-w64-mingw32/release/bin/cjvs.exe

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} dist/* --repo ${{ github.repository }}